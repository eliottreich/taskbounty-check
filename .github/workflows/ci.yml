# CI for the public taskbounty-check repository. Least-privilege: read-only.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm test
      - run: npm pack --dry-run

  # Dogfood: run the bundled Action on this repo and write a sanitized summary.
  self-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
      - run: node "$GITHUB_WORKSPACE/src/index.js" . --github-summary --no-network
