# CI for the public taskbounty-check repository. Least-privilege: read-only.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm test
      - run: npm pack --dry-run

  # Dogfood: run the bundled Action on this repo and write a sanitized summary.
  self-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
      - run: node "$GITHUB_WORKSPACE/src/index.js" . --github-summary --no-network
